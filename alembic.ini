# Alembic configuration for Praxys (#360).
#
# The database URL is intentionally a dummy here. alembic/env.py resolves the
# real URL from db.session.get_database_url() so migrations always target the
# same database the app uses (SQLite locally, PostgreSQL in production) and
# reuse the app engine construction (Entra/MI auth, SQLite pragmas).

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S