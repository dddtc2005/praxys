id: banister_pmc
pillar: load
name: Banister PMC
author: system
description: 行业标准的 Performance Management Chart。Fitness 大约在 6 周内累积（CTL），fatigue 大约在
  1 周内消退（ATL）。TSB = CTL - ATL。最适合每周训练 4-6 天的 5K-马拉松跑者。
simple_description: 你的仪表板会跟踪 fitness，作为每日训练压力的 6 周移动平均，以及 fatigue，作为 1 周移动平均。两者之间的差值就是你的“状态”——为正时，你处于充分恢复状态并已准备好比赛；为负时，你正在承受近期训练带来的疲劳。这在训练周期中是正常且预期内的。
advanced_description: "## Banister Performance Management Chart\n\n**Exponentially\
  \ Weighted Moving Averages (EWMA):**\n- **CTL** (Chronic Training Load / Fitness)\
  \ = EWMA(daily_load, α = 1/42)\n- **ATL** (Acute Training Load / Fatigue) = EWMA(daily_load,\
  \ α = 1/7)\n- **TSB** (Training Stress Balance / Form) = CTL − ATL\n\n平滑常数 α = 1/τ\
  \ 遵循 TrainingPeaks、\nStryd 和 Intervals.icu 使用的惯例。42 天和 7 天的时间常数是 Banister 原始范围（fitness\
  \ 为 30–50 天，\nfatigue 为 5–10 天）的名义近似值。\n\n**TSB Zone Boundaries:**\n| Zone | TSB\
  \ Range | Interpretation |\n|------|-----------|----------------|\n| Performance\
  \ | 5 to 25 | 充分恢复，准备比赛 |\n| Optimal | −10 to 5 | 训练/恢复平衡 |\n| Productive | −25\
  \ to −10 | 正在吸收训练负荷 |\n| Overreaching | < −25 | 疲劳较高，受伤风险 |\n\n**References:**\n\
  - Banister (1975) \"A systems model of training for athletic performance\"\n- Banister\
  \ (1991) \"Modeling elite athletic performance\" — exponential k-weighted TRIMP（k_male\
  \ 1.92, k_female 1.67）的来源\n- Morton, Fitz-Clarke & Banister (1990) \"Modeling human\
  \ performance in\n  running\" — 消耗 TRIMP 的 impulse-response model\n- TrainingPeaks,\
  \ \"The Science of the Performance Manager\""
