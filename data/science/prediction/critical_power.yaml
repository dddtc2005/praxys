id: critical_power
pillar: prediction
name: "Critical Power Model"
author: system
description: >
  Uses Critical Power as the primary predictor, with power-duration fractions per
  race distance from Stryd's model. Best when power data and CP estimates are available.
simple_description: >
  Predicts your race times using your Critical Power (CP) — the highest power you
  can sustain for about an hour. For each race distance, there's a known fraction
  of CP that top runners sustain. Your predicted time comes from your CP, this
  fraction, and your power-to-pace relationship.
advanced_description: |
  ## Critical Power Prediction Model

  **Power-duration model:** P = CP + W'/t

  Where CP is Critical Power (sustainable ~60 min) and W' is the finite work
  capacity above CP.

  **Race power fractions (from Stryd):**
  | Distance | % of CP |
  |----------|---------|
  | 5K | 103.8% |
  | 10K | 100.0% |
  | Half Marathon | 94.6% |
  | Marathon | 89.9% |
  | 50K | 88.0% |
  | 50 Mile | 85.0% |
  | 100K | 82.0% |
  | 100 Mile | 78.0% |

  Uses Riegel exponent (1.06) as fallback for pace scaling when power-to-pace
  lookup is unavailable.

  **References:**
  - Monod & Scherrer (1965) "The work capacity of a synergic muscular group," *Ergonomics*
  - Stryd Race Power Calculator

