id: hrv_weighted
pillar: recovery
name: "HRV-Primary Recovery"
author: system
description: >
  Strict HRV-driven recovery assessment. Uses the same ln(RMSSD) analysis
  as the composite model but relies almost exclusively on HRV status for
  training decisions. Requires consistent daily HRV recordings (>80% coverage).
  Based on Kiviniemi et al (2007).
simple_description: >
  Relies primarily on your heart rate variability for recovery decisions.
  If HRV says you're fatigued, the recommendation is always rest or easy —
  regardless of how sleep or resting heart rate look. Best if you have
  consistent daily HRV recordings from an Oura Ring or chest strap.
advanced_description: |
  ## HRV-Primary Recovery Assessment

  Uses the same Plews/Kiviniemi ln(RMSSD) analysis as the composite model,
  but with stricter HRV-driven decisions:

  **Key difference from composite:**
  - Sleep and RHR do NOT modify the recommendation
  - HRV status alone drives the Fresh / Normal / Fatigued decision
  - CV threshold is enforced more strictly (any CV > 10% → modify)

  **Data requirement:** ≥ 80% daily HRV recordings for reliable baseline.
  Below this threshold, consider the composite model instead.

  **Protocol (Kiviniemi et al, 2007):**
  - HRV ≥ threshold → high intensity permitted
  - HRV < threshold OR 2+ day decline → rest/easy only
  - No subjective overrides

citations:
  - key: kiviniemi2007
    title: "Endurance training guided individually by daily heart rate variability measurements"
    year: 2007
    journal: "European Journal of Applied Physiology"
    doi: "10.1007/s00421-007-0552-2"
  - key: plews2012
    title: "Heart rate variability in elite triathletes, is variation in variability the key to effective training?"
    year: 2012
    journal: "European Journal of Applied Physiology"
    doi: "10.1007/s00421-012-2354-4"

params:
  rolling_days: 7
  baseline_days: 30
  cv_threshold: 10
  hrv_coverage_min: 0.8

signal:
  tsb_high_fatigue: -20
