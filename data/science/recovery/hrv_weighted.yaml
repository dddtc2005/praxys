id: hrv_weighted
pillar: recovery
name: "HRV-Weighted Readiness"
author: system
description: >
  HRV-primary readiness model for athletes with consistent daily HRV recordings.
  Uses both HRV mean and coefficient of variation (CV) to detect acute homeostatic
  disturbances. Requires >80% daily HRV data coverage for accuracy.

citations:
  - key: kiviniemi2007
    title: "Endurance training guided individually by daily heart rate variability measurements"
    year: 2007
    journal: "European Journal of Applied Physiology"
  - key: plews2013
    title: "Heart rate variability in elite triathletes"
    year: 2013
    journal: "Journal of Science and Medicine in Sport"

params:
  hrv_weight: 0.6
  sleep_weight: 0.25
  rhr_weight: 0.15
  readiness_fresh: 80
  readiness_moderate: 60
  hrv_cv_threshold: 10
