id: composite
pillar: recovery
name: "HRV-Based Recovery (Composite)"
author: system
description: >
  Recovery assessment using ln(RMSSD) analysis with sleep and resting
  heart rate as supplementary decision signals. Based on Plews et al (2012)
  HRV monitoring and Kiviniemi et al (2007) threshold protocol.
simple_description: >
  Monitors your heart rate variability (ln RMSSD) against a personal baseline
  to determine recovery status (Fresh / Normal / Fatigued). Sleep quality
  and resting heart rate are shown as supplementary context and can modify
  the training recommendation when extreme, but are not combined into a
  weighted score.
advanced_description: |
  ## HRV-Based Recovery Assessment

  **Primary signal: ln(RMSSD)**
  - Log-transformed nocturnal RMSSD from Oura Ring
  - Compared to 30-day rolling mean and standard deviation

  **Status determination (combining Kiviniemi + Plews):**
  | Condition | Status | Source |
  |-----------|--------|--------|
  | ln(RMSSD) > mean + 0.5 SD | Fresh | Plews SWC (smallest worthwhile change) |
  | mean − 1 SD ≤ ln(RMSSD) ≤ mean + 0.5 SD | Normal | Between thresholds |
  | ln(RMSSD) < mean − 1 SD | Fatigued | Kiviniemi threshold |
  | < 5 HRV readings | Insufficient Data | Cannot classify |

  Note: Kiviniemi's original protocol was binary (above/below mean − 1 SD).
  The "Fresh" upper bound uses Plews' SWC concept (±0.5 SD = smallest
  meaningful change) to add a third zone. Kiviniemi used HF power; we use
  RMSSD as a validated proxy (both reflect parasympathetic activity).

  **Trend monitoring (Plews et al, 2012):**
  - 7-day rolling mean of ln(RMSSD): declining trend signals maladaptation
  - 7-day coefficient of variation (CV): CV > 10% signals autonomic disturbance

  **Supplementary signals (informational, not weighted):**
  - Sleep quality: modifies recommendation if < 55 (poor)
  - Resting heart rate: flags if > 1 SD above personal mean
  - TSB: from the load model, shown for context

  **What this model does NOT do:**
  - Does not combine signals into a single weighted score
  - Does not invent normalization formulas without research backing

citations:
  - key: plews2012
    title: "Heart rate variability in elite triathletes, is variation in variability the key to effective training?"
    year: 2012
    journal: "European Journal of Applied Physiology"
    doi: "10.1007/s00421-012-2354-4"
  - key: kiviniemi2007
    title: "Endurance training guided individually by daily heart rate variability measurements"
    year: 2007
    journal: "European Journal of Applied Physiology"
    doi: "10.1007/s00421-007-0552-2"

params:
  rolling_days: 7
  baseline_days: 30
  cv_threshold: 10
  sleep_poor_threshold: 55

signal:
  tsb_high_fatigue: -20
